name: Bug Report
description: Something isn't working as expected
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of react-modern-audio-player are you using?
      placeholder: e.g. 1.4.0-rc.2
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React Version
      placeholder: e.g. 18.3.1
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Framework / browser / OS
      placeholder: e.g. Next.js 14, Chrome, macOS
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Render <AudioPlayer ... />
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction Code
      render: tsx
      placeholder: Paste a minimal code snippet that reproduces the issue.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, error logs, or anything else relevant.
