name: Feature Request
description: Suggest a new feature or improvement
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve react-modern-audio-player? Describe it below!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What are you trying to do?
      placeholder: I'm trying to... but currently there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: If this involves a new prop or API, show how you'd like it to look.
      render: tsx
      placeholder: |
        <AudioPlayer
          newProp={value}
        />

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
