name: CodeRabbit Review Sync

on:
  pull_request_review:
    types: [submitted]

jobs:
  mark-review-ready:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # CodeRabbit이 코멘트 형태로 리뷰를 완료했을 때만 실행
    if: |
      github.event.review.user.login == 'coderabbitai[bot]' &&
      github.event.review.state == 'commented'
    permissions:
      issues: write
    steps:
      - name: Upsert review-ready marker comment
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        with:
          script: |
            const MARKER = '<!-- coderabbit-review-sync-marker -->';

            const prNumber      = context.payload.pull_request.number;
            const reviewId      = context.payload.review.id;
            const headSha       = context.payload.pull_request.head.sha;
            const submittedAt   = context.payload.review.submitted_at;

            const payload = {
              event:        'coderabbit_review_complete',
              pr_number:    prNumber,
              review_id:    reviewId,
              head_sha:     headSha,
              submitted_at: submittedAt,
            };

            const body = [
              MARKER,
              '### CodeRabbit Review Ready',
              '',
              '```json',
              JSON.stringify(payload, null, 2),
              '```',
              '',
              '_로컬 분석 툴에서 사용하는 마커 코멘트입니다. 삭제하지 마세요._',
            ].join('\n');

            // 기존 마커 코멘트 조회 (upsert)
            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                per_page:     100,
              }
            );

            const existing = comments.find(
              c => c.body?.includes(MARKER) && c.user?.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated marker comment #${existing.id} for PR #${prNumber}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created marker comment #${created.data.id} for PR #${prNumber}`);
            }
