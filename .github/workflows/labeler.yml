name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Ensure labels exist
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const labels = [
              { name: 'ci',            color: '0075ca' },
              { name: 'feature',       color: '0052cc' },
              { name: 'bug',           color: 'd73a4a' },
              { name: 'documentation', color: '0075ca' },
              { name: 'refactor',      color: 'e4e669' },
              { name: 'test',          color: 'bfd4f2' },
              { name: 'performance',   color: 'f9d0c4' },
              { name: 'chore',         color: 'ededed' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                });
              } catch (e) {
                if (e.status !== 422) throw e; // 422 = already exists, skip
              }
            }

      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Request review from maintainer for external PRs
        if: github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['slash9494']
            })
